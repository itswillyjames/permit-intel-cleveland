services:
  # Backend API
  - type: web
    name: permit-intel-api
    runtime: python312
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: pserv
          property: connectionString

  # Frontend
  - type: web
    name: permit-intel-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: permit-intel-api
          type: web
          property: url

  # Background Worker (Celery)
  - type: background
    name: permit-intel-worker
    runtime: python312
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: pserv
          property: connectionString

# Database
databases:
  - name: postgres-db
    databaseName: permitdb
    user: permituser
    plan: free

# Cache/Message Queue
services:
  - type: pserv
    name: redis
    runtime: redis7
    plan: free


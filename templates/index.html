<!doctype html>
<html>
<head>
<title>Permit Intel Cleveland</title>
<link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
<h1>Permit Intel — Cleveland</h1>
<a href="/crm">Command Center →</a>
<table id="t"></table>
<script>
fetch('/api/permits').then(r=>r.json()).then(data=>{
  const t=document.getElementById("t");
  t.innerHTML="<tr><th>Permit</th><th>Status</th><th>Value</th><th>Description</th></tr>";
  data.forEach(p=>{
    t.innerHTML+=`<tr>
      <td>${p.permit_id}</td>
      <td>${p.status}</td>
      <td>$${Number(p.value).toLocaleString()}</td>
      <td>${p.description||""}</td>
    </tr>`;
  });
});
</script>
</body>
</html>
